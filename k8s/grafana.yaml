apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: load-forecast
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: load-forecast
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: load-forecast
data:
  load-forecast.json: |
    {
      "title": "Load Forecast MLOps Monitor",
      "uid": "load-forecast",
      "schemaVersion": 38,
      "version": 3,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "timezone": "browser",
      "graphTooltip": 1,
      "tags": ["load-forecast", "mlops"],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "enable": true,
            "expr": "increase(retrain_started_total{job=\"load-forecast-dynamic\"}[20s]) > 0",
            "iconColor": "#73BF69",
            "name": "Dynamic Retrain Started",
            "titleFormat": "Dynamic retrain started",
            "textFormat": "Job started",
            "type": "dashboard"
          },
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "enable": true,
            "expr": "increase(retrain_started_total{job=\"load-forecast-inline\"}[20s]) > 0",
            "iconColor": "#FF9830",
            "name": "Inline Retrain Started",
            "titleFormat": "Inline retrain started",
            "textFormat": "Inline training in API pod",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Dynamic Drift Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "OK", "color": "green" },
                    "1": { "text": "DRIFT", "color": "red" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "drift_active{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Drift",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Dynamic Retrains Completed",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "retrain_count_total{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Retrains",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Dynamic Model Loaded",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Base", "color": "blue" },
                    "1": { "text": "Retrained", "color": "green" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "model_retrained_active{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Model",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Dynamic Rolling MAE",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1500 },
                  { "color": "red", "value": 2000 }
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "rolling_mae_mw{job=\"load-forecast-dynamic\"}",
              "legendFormat": "MAE",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Inline Drift Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "OK", "color": "green" },
                    "1": { "text": "DRIFT", "color": "red" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },

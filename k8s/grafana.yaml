                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "drift_active{job=\"load-forecast-inline\"}",
              "legendFormat": "Drift",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Inline Retrains Completed",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "retrain_count_total{job=\"load-forecast-inline\"}",
              "legendFormat": "Retrains",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Inline Model Loaded",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Base", "color": "blue" },
                    "1": { "text": "Retrained", "color": "green" }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "model_retrained_active{job=\"load-forecast-inline\"}",
              "legendFormat": "Model",
              "refId": "A"
            }
          ]
        },
        {
          "id": 42,
          "title": "Inline Rolling MAE",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1500 },
                  { "color": "red", "value": 2000 }
                ]
              },
              "unit": "short"
            }
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "rolling_mae_mw{job=\"load-forecast-inline\"}",
              "legendFormat": "MAE",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Static Model: Actual vs Evaluated Prediction",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Static.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#F2CC0C", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Predicted.*" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [6, 4], "fill": "dash" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["mean", "last"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "latest_actual_mw{job=\"load-forecast-static\"}",
              "legendFormat": "Static Actual MW",
              "refId": "A"
            },
            {
              "expr": "evaluated_prediction_mw{job=\"load-forecast-static\"}",
              "legendFormat": "Static Predicted MW",
              "refId": "B"
            }
          ]
        },
        {
          "id": 11,
          "title": "Dynamic Model: Actual vs Evaluated Prediction",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },

          "options": {
            "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"load-forecast-static\"}[1m])",
              "legendFormat": "Static CPU cores",
              "refId": "A"
            },
            {
              "expr": "rate(process_cpu_seconds_total{job=\"load-forecast-dynamic\"}[1m])",
              "legendFormat": "Dynamic CPU cores",
              "refId": "B"
            },
            {
              "expr": "rate(process_cpu_seconds_total{job=\"load-forecast-inline\"}[1m])",
              "legendFormat": "Inline CPU cores",
              "refId": "C"
            }
          ]
        },
        {
          "id": 32,
          "title": "API Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {

        },
        {
          "id": 20,
          "title": "Rolling MAE vs Drift Threshold",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Static.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#F2CC0C", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Dynamic.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Inline.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#FF9830", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Drift Threshold" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } },
                  { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["mean", "last"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "rolling_mae_mw{job=\"load-forecast-static\"}",
              "legendFormat": "Static MAE",
              "refId": "A"
            },
            {
              "expr": "rolling_mae_mw{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Dynamic MAE",
              "refId": "B"
            },
            {
              "expr": "rolling_mae_mw{job=\"load-forecast-inline\"}",
              "legendFormat": "Inline MAE",
              "refId": "C"
            },
            {
              "expr": "vector(2000)",
              "legendFormat": "Drift Threshold",
              "refId": "D"
            }
          ]
        },
        {
          "id": 21,
          "title": "Latest Point Error",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Static.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#F2CC0C", "mode": "fixed" } }

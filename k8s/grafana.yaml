                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["mean", "last"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "latest_actual_mw{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Dynamic Actual MW",
              "refId": "A"
            },
            {
              "expr": "evaluated_prediction_mw{job=\"load-forecast-dynamic\"}",
              "legendFormat": "Dynamic Predicted MW",
              "refId": "B"
            }
          ]
        },
        {
          "id": 12,
          "title": "Inline Model: Actual vs Evaluated Prediction",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Inline.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#FF9830", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Predicted.*" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [6, 4], "fill": "dash" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" },

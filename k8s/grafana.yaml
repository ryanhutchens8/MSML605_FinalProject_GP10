            {
              "expr": "prediction_error_mw{job=\"load-forecast-inline\"}",
              "legendFormat": "Inline Error",
              "refId": "C"
            }
          ]
        },
        {
          "id": 30,
          "title": "Prediction Latency p95",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },
              "unit": "s"
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": ".*Static.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#F2CC0C", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Dynamic.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#73BF69", "mode": "fixed" } }
                ]
              },
              {
                "matcher": { "id": "byRegexp", "options": ".*Inline.*" },
                "properties": [
                  { "id": "color", "value": { "fixedColor": "#FF9830", "mode": "fixed" } }
                ]
              }
            ]
          },
          "options": {
            "legend": { "calcs": ["last"], "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(prediction_duration_seconds_bucket{job=\"load-forecast-static\"}[1m])))",
              "legendFormat": "Static p95",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(prediction_duration_seconds_bucket{job=\"load-forecast-dynamic\"}[1m])))",
              "legendFormat": "Dynamic p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(prediction_duration_seconds_bucket{job=\"load-forecast-inline\"}[1m])))",
              "legendFormat": "Inline p95",
              "refId": "C"
            }
          ]
        },
        {
          "id": 31,
          "title": "API CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 },

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: load-forecast
data:
  prometheus.yml: |
    global:
      scrape_interval: 1s
      evaluation_interval: 1s

    scrape_configs:
      - job_name: 'load-forecast-static'
        static_configs:
          - targets: ['static-service:8000']
        metrics_path: /metrics

      - job_name: 'load-forecast-dynamic'
        static_configs:
          - targets: ['dynamic-service:8000']
        metrics_path: /metrics

      - job_name: 'load-forecast-inline'
        static_configs:
          - targets: ['inline-service:8000']
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: load-forecast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.2
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=1h"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: load-forecast
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
